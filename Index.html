<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <style>
    :root { 
      --gkpi-blue: #003366; 
      --gkpi-blue-dark: #001a33;
      --gkpi-gold: #ffcc00; 
      --text-dark: #1e293b;
      --text-muted: #64748b;
    }
    
    body { 
      margin: 0;
      padding: 0; 
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif; 
      background-color: #000; 
      position: relative;
      overflow-x: hidden;
      display: block; 
      min-height: 100vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('https://lh3.googleusercontent.com/d/1fjbh4r3PIUOuPJpRuc1tmyWGlr155TgJ'); 
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      filter: grayscale(100%);
      opacity: 0.45; 
      z-index: -1; 
    }

    .app-container { 
      background: rgba(255, 255, 255, 0.98); 
      width: 92%; 
      max-width: 400px; 
      margin: 40px auto; 
      border-radius: 20px; 
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2); 
      overflow: visible; 
      border: 1px solid rgba(255, 255, 255, 0.5);
      position: relative;
    }

    .app-header { 
      background: linear-gradient(135deg, var(--gkpi-blue), #004a99); 
      color: white; padding: 30px 20px; text-align: center; 
      border-bottom: 4px solid var(--gkpi-gold); 
      border-radius: 20px 20px 0 0; /* Tambahan sedikit border radius di header */
    }
    .app-header h4 { font-weight: 800; margin: 0; letter-spacing: 0.5px; }
    .app-header p { opacity: 0.85; font-size: 0.75rem; margin-top: 5px; text-transform: uppercase; letter-spacing: 1px; }
    
    .app-body { padding: 25px; }
    
    /* --- UI LOGIN MODERN --- */
    .login-container {
      padding: 5px;
      text-align: center;
    }
    .logo-gkpi {
      width: 85px;
      height: 85px;
      object-fit: contain;
      margin-bottom: 18px;
      background-color: #ffffff;
      border-radius: 50%;
      padding: 10px;
      box-shadow: 0 8px 20px rgba(0, 51, 102, 0.1);
      border: 1px solid #f1f5f9;
    }
    .login-title {
      font-weight: 800;
      color: var(--text-dark);
      font-size: 1.35rem;
      margin-bottom: 5px;
    }
    .login-subtitle {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 25px;
    }
    .input-modern {
      position: relative;
      margin-bottom: 18px;
    }
    .input-modern i {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      font-size: 1.1rem;
      transition: color 0.3s ease;
      z-index: 2;
    }
    .input-modern .form-control {
      padding-left: 48px;
      height: 54px;
      border-radius: 16px;
      border: 1.5px solid #e2e8f0;
      background-color: #f8fafc;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text-dark);
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
      transition: all 0.3s ease;
    }
    .input-modern .form-control:focus {
      border-color: var(--gkpi-blue);
      background-color: #ffffff;
      box-shadow: 0 0 0 4px rgba(0, 51, 102, 0.1);
    }
    .input-modern:focus-within i {
      color: var(--gkpi-blue); /* Ikon berubah warna saat diketik */
    }
    .btn-login {
      background: linear-gradient(to right, var(--gkpi-blue), #004a99); 
      color: white;
      height: 54px;
      border-radius: 16px;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 1px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      width: 100%;
      border: none;
      margin-top: 25px;
      box-shadow: 0 8px 15px rgba(0, 51, 102, 0.2);
      transition: all 0.3s ease;
    }
    .btn-login:hover, .btn-login:active {
      transform: translateY(-2px);
      box-shadow: 0 12px 20px rgba(0, 51, 102, 0.3);
    }
    /* ----------------------- */

    .form-label { font-size: 0.7rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .btn-utama { 
      background: linear-gradient(to right, var(--gkpi-blue), #004a99); 
      color: white; font-weight: 700; padding: 14px; 
      border-radius: 12px; width: 100%; border: none; 
      text-transform: uppercase; margin-top: 10px; 
      box-shadow: 0 8px 15px rgba(0, 51, 102, 0.2);
    }

    .status-badge { display: flex; align-items: center; justify-content: center; padding: 10px; border-radius: 10px; font-weight: 600; font-size: 0.8rem; margin-bottom: 20px; }
    .status-loading { background: #f1f5f9; color: #64748b; }
    .status-success { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
    .status-danger { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
    .status-info { background: #e0f2fe; color: #0369a1; border: 1px solid #bae6fd; }

    .camera-label { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; padding: 20px; background: #f8fafc; border: 2px dashed #cbd5e1; border-radius: 16px; cursor: pointer; }
    .camera-label.has-photo { background: #f0f9ff; border-color: var(--gkpi-blue); border-style: solid; color: var(--gkpi-blue); }
   #previewGambarStatis { 
      width: 100%; 
      height: auto; 
      max-height: 350px; 
      object-fit: cover;
      border-radius: 12px; 
      margin-top: 15px; 
      display: none; 
      border: 3px solid var(--gkpi-blue); 
    }

    #halamanAbsen { display: none; }
    .welcome-card { border-radius:12px; background:#f0f9ff; border: 1px solid #bae6fd; padding: 12px; text-align: center; margin-bottom: 20px; }
    
    #riwayatContainer { margin-top: 25px; background: white; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; }
    .table-riwayat { width: 100%; font-size: 12px; border-collapse: collapse; }
    .table-riwayat th { background: #f8fafc; padding: 8px; color: #64748b; border-bottom: 2px solid #e2e8f0; }
    .table-riwayat td { padding: 8px; border-bottom: 1px solid #f1f5f9; }
</style>
</head>
<body>

<div class="app-container">
  <div class="app-header">
    <h4>Absensi Digital</h4>
    <p>Kantor Sinode GKPI</p>
  </div>
  
  <div class="app-body">
    
    <!-- UI LOGIN MODERN -->
    <div id="halamanLogin" class="login-container">
      <!-- Menggunakan Link Gambar Logo GKPI Resmi -->
      <img src="https://upload.wikimedia.org/wikipedia/id/0/0d/Logo_GKPI.png" alt="Logo GKPI" class="logo-gkpi">
      <h5 class="login-title">Selamat Datang</h5>
      <p class="login-subtitle">Silakan masuk menggunakan akun Anda</p>
      
      <div class="input-modern text-start">
        <i class="fas fa-user"></i>
        <input type="text" id="inputUsername" class="form-control" placeholder="Username" autocomplete="off">
      </div>
      
      <div class="input-modern text-start">
        <i class="fas fa-lock"></i>
        <input type="password" id="inputPin" class="form-control" placeholder="PIN Akses">
      </div>
      
      <button type="button" id="btnLogin" class="btn-login" onclick="prosesLogin()">
        <span>MASUK</span> <i class="fas fa-sign-in-alt"></i>
      </button>
    </div>
    <!-- END UI LOGIN MODERN -->

    <div id="halamanAbsen">
      <div class="welcome-card">
        <small class="text-muted d-block">Selamat datang,</small>
        <strong id="tampilNamaLengkap" style="color:var(--gkpi-blue);">Nama Pegawai</strong>
      </div>

      <div id="gpsStatus" class="status-badge status-loading">
        <i class="fas fa-satellite-dish fa-spin me-2"></i> Mencari GPS...
      </div>

      <div id="formAbsen">
        <input type="hidden" id="namaPegawai">

       <div class="mb-3">
          <label class="form-label">Lokasi Kerja</label>
          <div class="btn-group w-100 shadow-sm rounded-3" role="group">
            <input type="radio" class="btn-check" name="modeLokasi" id="locKantor" value="KANTOR" checked onchange="cekLokasi()">
            <label class="btn btn-outline-info fw-bold" for="locKantor"><i class="fas fa-building me-1"></i> KANTOR</label>
            
            <input type="radio" class="btn-check" name="modeLokasi" id="locLuar" value="LAPANGAN" onchange="cekLokasi()">
            <label class="btn btn-outline-danger fw-bold" for="locLuar"><i class="fas fa-church me-1"></i> LAPANGAN</label>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label">Status Kehadiran</label>
          <div class="btn-group w-100 shadow-sm rounded-3" role="group">
            <input type="radio" class="btn-check" name="tipeAbsen" id="masuk" value="MASUK" checked>
            <label class="btn btn-outline-success fw-bold" for="masuk">DATANG</label>
            
            <input type="radio" class="btn-check" name="tipeAbsen" id="pulang" value="PULANG">
            <label class="btn btn-outline-warning fw-bold" for="pulang">PULANG</label>
          </div>
        </div>

        <div class="mb-4">
          <input type="file" id="fotoKamera" accept="image/*" capture="environment" class="d-none">
          <label for="fotoKamera" id="uiKamera" class="camera-label">
            <i class="fas fa-camera fa-2x mb-2" id="ikonKamera"></i>
            <span id="teksKamera" class="fw-bold">Buka Kamera</span>
          </label>
          <img id="previewGambarStatis" src="">
        </div>

        <button type="button" id="btnSubmit" class="btn-utama" onclick="prosesAbsen()" disabled>
          <i class="fas fa-paper-plane me-2"></i> KIRIM ABSENSI
        </button>

        <div id="riwayatContainer">
          <h6 class="text-center fw-bold mb-3" style="color:var(--gkpi-blue); font-size: 0.85rem;">
            <i class="fas fa-history me-1"></i> 5 RIWAYAT TERAKHIR
          </h6>
          <table class="table-riwayat">
            <thead>
              <tr>
                <th>Waktu</th>
                <th>Tipe</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="isiRiwayat">
              <tr><td colspan="3" class="text-center">Memuat data...</td></tr>
            </tbody>
          </table>
        </div>

      </div>
    </div>
  </div>
</div>

<script>
  const KANTOR_LAT = 2.9507367687454646; 
  const KANTOR_LNG = 99.06044938808277; 
  const MAX_JARAK = 50; 
  let statusLokasi = "Mencari...";
  let base64String = ""; 

  // --- FUNGSI BARU: OTOMATIS PILIH TIPE ABSEN ---
  function aturOtomatisAbsen() {
    const jamSekarang = new Date().getHours();
    if (jamSekarang >= 16) {
      document.getElementById('pulang').checked = true;
    } else {
      document.getElementById('masuk').checked = true;
    }
  }

  function prosesLogin() {
  const user = document.getElementById('inputUsername').value;
  const pin = document.getElementById('inputPin').value;
  const btn = document.getElementById('btnLogin');

  if(!user || !pin) { Swal.fire('Oops!', 'Isi Username & PIN', 'warning'); return; }

  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> MEMPROSES...';

  // GANTI URL DI BAWAH DENGAN URL WEB APP GAS ANDA YANG BARU
  const scriptUrl = 'URL_WEB_APP_ANDA_DISINI?action=login&user=' + user + '&pin=' + pin;

  fetch(scriptUrl)
    .then(response => response.json())
    .then(res => {
      if (res.sukses) {
        sessionStorage.setItem('statusLogin', 'sudah_login');
        sessionStorage.setItem('namaPegawaiSesi', res.namaLengkap);
        
        document.getElementById('halamanLogin').style.display = 'none';
        document.getElementById('halamanAbsen').style.display = 'block';
        document.getElementById('tampilNamaLengkap').innerText = res.namaLengkap;
        document.getElementById('namaPegawai').value = res.namaLengkap;
        
        muatRiwayat(res.namaLengkap);
        pancingIzinSistem();
        cekLokasi();
        aturOtomatisAbsen();
      } else {
        Swal.fire('Gagal', res.pesan, 'error');
        btn.disabled = false; 
        btn.innerHTML = '<span>MASUK</span> <i class="fas fa-sign-in-alt"></i>';
      }
    })
    .catch(error => {
      Swal.fire('Error', 'Koneksi ke server gagal', 'error');
      btn.disabled = false;
    });
}

  // --- KAMERA ---
  document.getElementById('fotoKamera').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = function(event) {
        const img = new Image();
        img.onload = function() {
          const canvas = document.createElement('canvas');
          const MAX_WIDTH = 400;
          let width = img.width, height = img.height;
          if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
          canvas.width = width; canvas.height = height;
          canvas.getContext('2d').drawImage(img, 0, 0, width, height);
          base64String = canvas.toDataURL('image/jpeg', 0.6);
          document.getElementById('previewGambarStatis').src = base64String;
          document.getElementById('previewGambarStatis').style.display = 'block';
          document.getElementById('uiKamera').classList.add('has-photo');
          document.getElementById('teksKamera').innerText = "Foto Siap!";
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    }
  });

  // --- GPS ---
  function hitungJarak(lat1, lon1, lat2, lon2) {
    const R = 6371e3;
    const p1 = lat1 * Math.PI/180, p2 = lat2 * Math.PI/180;
    const a = Math.sin((lat2-lat1)*Math.PI/180/2)**2 + Math.cos(p1)*Math.cos(p2)*Math.sin((lon2-lon1)*Math.PI/180/2)**2;
    return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
  }

  function cekLokasi() {
    const badge = document.getElementById('gpsStatus'), btn = document.getElementById('btnSubmit');
    const mode = document.querySelector('input[name="modeLokasi"]:checked').value;
    badge.className = "status-badge status-loading";
    navigator.geolocation.getCurrentPosition(function(pos) {
      const jarak = hitungJarak(KANTOR_LAT, KANTOR_LNG, pos.coords.latitude, pos.coords.longitude);
      if (mode === "KANTOR") {
        if (jarak <= MAX_JARAK) {
          statusLokasi = "Valid (Kantor)";
          badge.className = "status-badge status-success"; badge.innerHTML = "Lokasi Sesuai ("+jarak+"m)";
          btn.disabled = false;
        } else {
          badge.className = "status-badge status-danger"; badge.innerHTML = "Terlalu Jauh ("+jarak+"m)";
          btn.disabled = true;
        }
      } else {
        statusLokasi = "Lapangan ("+pos.coords.latitude+","+pos.coords.longitude+")";
        badge.className = "status-badge status-info"; badge.innerHTML = "Mode Lapangan Aktif";
        btn.disabled = false;
      }
    }, function() { badge.innerHTML = "Aktifkan GPS!"; }, {enableHighAccuracy:true});
  }

  // --- KIRIM ABSEN ---
  function prosesAbsen() {
    if(!base64String) { Swal.fire('Foto?', 'Ambil selfie dulu!', 'warning'); return; }
    const btn = document.getElementById('btnSubmit');
    const namaUser = document.getElementById('namaPegawai').value;
    btn.disabled = true; btn.innerHTML = 'MENGIRIM...';

    const payload = {
      nama: namaUser,
      tipe: document.querySelector('input[name="tipeAbsen"]:checked').value,
      statusLokasi: statusLokasi,
      fotoBase64: base64String
    };

    google.script.run.withSuccessHandler(function(msg) {
      Swal.fire('Berhasil', msg, 'success').then(() => {
        base64String = "";
        document.getElementById('previewGambarStatis').style.display = 'none';
        document.getElementById('uiKamera').classList.remove('has-photo');
        document.getElementById('teksKamera').innerText = "Buka Kamera";
        btn.disabled = false; btn.innerHTML = '<i class="fas fa-paper-plane me-2"></i> KIRIM ABSENSI';
        
        muatRiwayat(namaUser);
        aturOtomatisAbsen();
      });
    }).simpanAbsenFoto(payload);
  }

  // --- MESIN TABEL RIWAYAT ---
  function muatRiwayat(nama) {
    const tbody = document.getElementById('isiRiwayat');
    tbody.innerHTML = '<tr><td colspan="3" class="text-center"><i class="fas fa-spinner fa-spin"></i> Memuat data...</td></tr>';
    
    google.script.run.withSuccessHandler(function(data) {
      tbody.innerHTML = '';
      if (!data || data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3" class="text-center">Belum ada riwayat.</td></tr>';
        return;
      }
      data.forEach(function(item) {
        let colorS = (item.status === 'Terlambat' || item.status === 'Pulang Cepat') ? 'red' : 'green';
        let row = `<tr>
          <td>${item.waktu}</td>
          <td><b>${item.tipe}</b></td>
          <td style="color:${colorS}; font-weight:bold;">${item.status}</td>
        </tr>`;
        tbody.innerHTML += row;
      });
    }).getRiwayatAbsen(nama);
  }

  function pancingIzinSistem() {
    if (navigator.mediaDevices) navigator.mediaDevices.getUserMedia({video:true}).then(s => s.getTracks().forEach(t => t.stop()));
  }

  // --- SESSION CHECK ---
  window.onload = function() {
    if (sessionStorage.getItem('statusLogin') === 'sudah_login') {
      const nama = sessionStorage.getItem('namaPegawaiSesi');
      document.getElementById('halamanLogin').style.display = 'none';
      document.getElementById('halamanAbsen').style.display = 'block';
      document.getElementById('tampilNamaLengkap').innerText = nama;
      document.getElementById('namaPegawai').value = nama;
      muatRiwayat(nama);
      cekLokasi();
      aturOtomatisAbsen();
    }
  };
</script>
</body>
</html>
